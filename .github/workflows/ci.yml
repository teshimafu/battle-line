name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Syntax check
        run: node --check server.js && node --check game.js && node --check public/app.js
      - name: Game logic tests (100 random games)
        run: node test.js
      - name: API E2E test
        run: |
          node server.js &
          sleep 2
          node e2e.js
