name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type check & build
        run: npm run build
      - name: Game logic tests (100 random games)
        run: npm test
      - name: API E2E test
        run: |
          npm start &
          sleep 2
          npm run test:e2e
